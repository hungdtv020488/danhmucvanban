<!DOCTYPE html>
<html lang="vi"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a3d62">
<title>Danh mục văn bản</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
<style>
:root{--ink:#101827;--muted:#697588;--line:#e6eaf0;--bg:#eef2f6;--brand:#0a3d62;--brand2:#1469a3;--accent:#c0392b;--ok:#1e8449}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,"Segoe UI",Roboto,system-ui,Arial,sans-serif;font-size:16px}
header{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff;padding:13px 16px}
header h1{margin:0;font-size:16px;font-weight:700}
.wrap{max-width:600px;margin:0 auto;padding:14px 14px 40px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
.mic{display:block;margin:2px auto 0;width:88px;height:88px;border-radius:50%;border:none;color:#fff;font-size:36px;background:var(--brand);box-shadow:0 6px 18px rgba(10,61,98,.32);touch-action:manipulation}
.mic:active{transform:scale(.96)}
.mic.rec{background:var(--accent);animation:pulse 1.1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{box-shadow:0 0 0 18px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
.hint{text-align:center;font-size:13.5px;color:var(--muted);margin-top:10px;line-height:1.55}
.heard{display:none;margin-top:12px;background:#f2f6f9;border:1px dashed var(--line);border-radius:11px;padding:10px 12px;font-size:14px;color:#243}
.heard b{color:var(--brand2)}
.f{margin-top:12px}
.f label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.f input{width:100%;padding:13px 12px;border:1px solid var(--line);border-radius:11px;font-size:16px;font-family:inherit;background:#fcfdfe}
.f input:focus{outline:none;border-color:var(--brand2);box-shadow:0 0 0 3px rgba(20,105,163,.12)}
.two{display:flex;gap:10px}.two .f{flex:1}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:12px;border:1px solid var(--line);border-radius:11px;background:#fcfdfe;font-size:14.5px;font-family:inherit;color:var(--muted);touch-action:manipulation}
.seg button.on{border-color:var(--brand2);background:#eaf3fa;color:var(--brand);font-weight:700}
.save{margin-top:15px;width:100%;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:700;color:#fff;background:var(--ok);font-family:inherit;touch-action:manipulation}
.save:active{filter:brightness(.95)}
.txtbtn{background:none;border:none;color:var(--muted);font-size:13.5px;font-family:inherit;padding:6px;cursor:pointer}
.centerlink{text-align:center;margin-top:8px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.head h2{margin:0;font-size:15px;color:var(--brand)}
.head .r{display:flex;align-items:center;gap:6px}
.count{font-size:12.5px;color:var(--muted)}
.exp{background:var(--brand);color:#fff;border:none;border-radius:9px;padding:7px 13px;font-size:13px;font-weight:600;font-family:inherit}
.item{border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;background:#fcfdfe}
.item .t{display:flex;justify-content:space-between;gap:8px;font-size:14.5px}
.item .t b{color:var(--brand)}
.item .n{font-size:12px;color:#fff;background:var(--brand2);border-radius:20px;padding:2px 9px;flex:none;height:fit-content}
.tag{display:inline-block;font-size:11px;padding:1px 8px;border-radius:20px;margin-left:6px;vertical-align:middle}
.tag.g{background:#e6f4ec;color:var(--ok)}
.tag.o{background:#fdecdf;color:#b9591a}
.item .m{font-size:12.5px;color:var(--muted);margin-top:3px}
.item .y{font-size:13.5px;margin-top:4px}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:16px 0}
.foot{display:flex;justify-content:flex-end;gap:14px;margin-top:6px}
.warn{display:none;background:#fdf3e7;border:1px solid #f6d9a8;color:#8a5a00;padding:11px 12px;border-radius:11px;font-size:13px;margin-bottom:14px;line-height:1.5}
.divider{display:flex;align-items:center;gap:10px;margin:14px 2px 6px;color:var(--muted);font-size:12px}
.divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--line)}
.up{display:block;text-align:center;border:1.5px dashed var(--line);border-radius:11px;padding:13px;color:var(--brand2);font-size:14px;font-weight:600;background:#fbfdfe}
.up input{display:none}
.cprev{margin-top:8px;text-align:center}
.cprev img{max-width:100%;max-height:180px;border-radius:9px;border:1px solid var(--line)}
.ocrp{display:none;margin-top:9px;font-size:12px;color:var(--muted)}
.ocrp .bar{height:7px;background:#e6eaf0;border-radius:6px;overflow:hidden;margin-top:4px}
.ocrp .bar>i{display:block;height:100%;width:0;background:var(--brand2);transition:.2s}
.ocrs{display:none;margin-top:9px;font-size:12px;line-height:1.5;padding:8px 10px;border-radius:9px;background:#eef4fb;color:#234;border:1px solid #d7e6f4}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:24px;font-size:14px;opacity:0;transition:.25s;pointer-events:none;z-index:20}
.toast.show{opacity:1}
.note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:10px}
</style></head>
<body>
<header><h1>Danh mục văn bản — nhập bằng giọng nói</h1></header>
<div class="wrap">
  <div class="warn" id="warn"></div>

  <div class="card">
    <button class="mic" id="mic" aria-label="Bấm để nói">🎤</button>
    <div class="hint" id="hint">Bấm micro rồi đọc, ví dụ:<br><b>“Công văn số 1234 ngày 15 tháng 3 năm 2026, bản chính”</b><br>Nói thêm “bản chính” hoặc “photo” để đánh dấu.</div>
    <div class="heard" id="heard"></div>
    <div class="divider">hoặc chụp ảnh văn bản</div>
    <label class="up">📷 Chụp ảnh hoặc chọn từ thư viện
      <input id="docFile" type="file" accept="image/*">
    </label>
    <div class="cprev" id="cprev"></div>
    <div class="ocrp" id="ocrp">Đang nhận dạng… <span id="ocrpct">0%</span><div class="bar"><i id="ocrbar"></i></div></div>
    <div class="ocrs" id="ocrs"></div>
    <div class="two">
      <div class="f"><label>Loại văn bản</label><input id="loai" placeholder="Công văn"></div>
      <div class="f"><label>Số</label><input id="so" placeholder="1234/CV-BX"></div>
    </div>
    <div class="f"><label>Ngày tháng</label><input id="ngay" inputmode="numeric" placeholder="dd/mm/yyyy"></div>
    <div class="f"><label>Bản chính / Photo</label>
      <div class="seg" id="seg">
        <button data-v="Bản chính">Bản chính</button>
        <button data-v="Photo">Photo</button>
      </div>
    </div>
    <div class="f"><label>Trích yếu (tùy chọn)</label><input id="trichyeu" placeholder="Nội dung tóm tắt"></div>
    <button class="save" id="save">Lưu vào danh mục</button>
    <div class="centerlink"><button class="txtbtn" id="clear">Xóa các ô</button></div>
  </div>

  <div class="card">
    <div class="head">
      <h2>Danh mục</h2>
      <div class="r"><span class="count" id="count"></span><button class="exp" id="export">Tải CSV</button></div>
    </div>
    <div id="list"></div>
    <div class="foot">
      <button class="txtbtn" id="undo">Xóa dòng cuối</button>
      <button class="txtbtn" id="wipe">Xóa hết</button>
    </div>
    <div class="note">Dữ liệu lưu trên máy này. Tải CSV để mở bằng Excel hoặc chuyển sang máy tính.</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
var $=function(id){return document.getElementById(id);};
var COLS=["STT","Loại văn bản","Số văn bản","Ngày tháng","Bản chính/Photo","Trích yếu","Thời gian nhập"];
var KEY="danh_muc_van_ban_v1";

function load(){var r;
  try{r=JSON.parse(localStorage.getItem(KEY)||"[]");}catch(e){r=window._mem||[];}
  for(var i=0;i<r.length;i++){ if(r[i].length===6){ r[i]=[r[i][0],r[i][1],r[i][2],r[i][3],"",r[i][4],r[i][5]]; } }
  return r;}
function store(r){window._mem=r;try{localStorage.setItem(KEY,JSON.stringify(r));}catch(e){}}

/* ---- Bộ tách tiếng Việt (đã kiểm thử khớp bản Python) ---- */
var UNITS={"không":0,"linh":0,"lẻ":0,"một":1,"mốt":1,"hai":2,"ba":3,"bốn":4,"tư":4,"năm":5,"lăm":5,"nhăm":5,"sáu":6,"bảy":7,"bẩy":7,"tám":8,"chín":9,"giêng":1,"chạp":12};
var NUMW=new Set(Object.keys(UNITS).concat(["mười","mươi","trăm","nghìn","ngàn","triệu"]));
function parseGroup(toks){var val=0,p=null;
  for(var i=0;i<toks.length;i++){var t=toks[i];
    if(t==="trăm"){val+=(p!==null?p:1)*100;p=null;}
    else if(t==="mười"){val+=10;p=null;}
    else if(t==="mươi"){val+=(p!==null?p:0)*10;p=null;}
    else if(UNITS[t]!==undefined){p=UNITS[t];}
  } if(p!==null)val+=p; return val;}
function vnWordsToInt(toks){var g=0,cur=[];
  for(var i=0;i<toks.length;i++){var t=toks[i];
    if(t==="triệu"){g+=parseGroup(cur)*1000000;cur=[];}
    else if(t==="nghìn"||t==="ngàn"){g+=parseGroup(cur)*1000;cur=[];}
    else cur.push(t);
  } g+=parseGroup(cur); return g;}
function phraseToInt(s){
  if(!s)return null;
  s=s.toLowerCase().trim().replace(/(mùng|mồng)/g," ");
  var d=s.match(/\d+/); if(d)return parseInt(d[0],10);
  var toks=s.split(/\s+/).filter(function(w){return NUMW.has(w);});
  return toks.length?vnWordsToInt(toks):null;}
var DOC_TYPES=["tờ trình","công văn","quyết định","nghị quyết","nghị định","thông tư","thông báo","báo cáo","kế hoạch","hướng dẫn","biên bản","chỉ thị","quy định","quy chế","giấy mời","giấy đề nghị","giấy ủy quyền","hợp đồng","phụ lục","đề án","phương án","chương trình","công điện","công lệnh","văn bản"];
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):s;}
function detectType(text){var low=text.toLowerCase(),best=null,bp=1e9;
  for(var i=0;i<DOC_TYPES.length;i++){var p=low.indexOf(DOC_TYPES[i]);if(p!==-1&&p<bp){bp=p;best=DOC_TYPES[i];}}
  return best?cap(best):"";}
function detectForm(text){var low=text.toLowerCase();
  if(/bản chính|bản gốc/.test(low))return "Bản chính";
  if(/photo|foto|ph[ôố]\s?t[ôố]|bản sao|bản chụp/.test(low))return "Photo";
  return "";}
function stripFormWords(text){
  return text.replace(/(bản chính|bản gốc|bản sao|bản chụp|photo|foto|ph[ôố]\s?t[ôố])/gi," ").replace(/\s+/g," ").trim();}
function extractSo(text){
  var low=text.toLowerCase();
  var pos=low.search(/số\s/);
  if(pos===-1){var m2=text.match(/(\d{1,6}\s*\/\s*[A-Za-zĐđ0-9.\/\-]+)/);return m2?m2[1].replace(/\s+/g,""):"";}
  var rest=text.slice(pos+text.slice(pos).search(/\s/)).replace(/^\s+/,"");
  var md=rest.match(/^(\d{1,6})\s*(\/\s*[A-Za-zĐđ0-9.\/\-]+)?/);
  if(md&&md[1])return md[1]+(md[2]?md[2].replace(/\s+/g,""):"");
  var lr=rest.toLowerCase(),stop=lr.length,w=["ngày","ký hiệu","về việc","về","v/v"];
  for(var i=0;i<w.length;i++){var p=lr.indexOf(w[i]);if(p!==-1&&p<stop)stop=p;}
  var v=phraseToInt(lr.slice(0,stop));return v?String(v):"";}
function fmtDate(d,m,y){
  if(!d||!m)return "";if(!y)y=new Date().getFullYear();if(y<100)y+=2000;
  if(!(d>=1&&d<=31&&m>=1&&m<=12))return "";
  var p=function(n){return String(n).padStart(2,"0");};
  return p(d)+"/"+p(m)+"/"+String(y).padStart(4,"0");}
function extractDate(text){
  var low=text.toLowerCase(),m;
  m=low.match(/(\d{1,2})\s*[\/\-.]\s*(\d{1,2})\s*[\/\-.]\s*(\d{2,4})/);
  if(m)return fmtDate(+m[1],+m[2],+m[3]);
  m=low.match(/ngày\s+(.+?)\s+tháng\s+(.+?)\s+năm\s+(.+?)(?:\s+(?:về việc|về|v\/v|ký hiệu|bản chính|bản gốc|photo)|$)/);
  if(m)return fmtDate(phraseToInt(m[1]),phraseToInt(m[2]),phraseToInt(m[3]));
  m=low.match(/ngày\s+(.+?)\s+tháng\s+(.+?)(?:\s+(?:về việc|về|v\/v|năm|ký hiệu|bản chính|bản gốc|photo)|$)/);
  if(m)return fmtDate(phraseToInt(m[1]),phraseToInt(m[2]),null);
  return "";}
function extractTrichyeu(text){
  var low=text.toLowerCase();
  var m=low.match(/(về việc|v\/v|về)/);
  if(m){var tr=text.slice(m.index+m[0].length).replace(/^[\s.,:]+|[\s.,:]+$/g,"");return cap(tr);}
  var m2=low.match(/năm\s+\S+\s+(.+)$/);
  if(m2){var i=low.lastIndexOf(m2[1]);var t2=text.slice(i).replace(/^[\s.,:]+|[\s.,:]+$/g,"");return t2.length>4?cap(t2):"";}
  return "";}
var TYPE_CODE={"CV":"Công văn","QĐ":"Quyết định","QD":"Quyết định","NQ":"Nghị quyết","NĐ":"Nghị định","ND":"Nghị định","TT":"Thông tư","TB":"Thông báo","TTR":"Tờ trình","BC":"Báo cáo","KH":"Kế hoạch","HD":"Hướng dẫn","HĐ":"Hợp đồng","BB":"Biên bản","CT":"Chỉ thị","QC":"Quy chế","PL":"Phụ lục","GM":"Giấy mời"};
function typeFromCode(s){if(!s)return "";
  var m=(""+s).match(/\/\s*([A-Za-zĐđ]{2,4})/);
  if(m){var c=m[1].toUpperCase();if(TYPE_CODE[c])return TYPE_CODE[c];}
  return "";}
function parseDocument(t){t=(t||"").trim();
  var tc=stripFormWords(t);
  var so=extractSo(t);
  var loai=detectType(t)||typeFromCode(so);
  return {loai:loai,so:so,ngay:extractDate(t),form:detectForm(t),trichyeu:extractTrichyeu(tc)};}
function fillFromDoc(d){
  if(d.loai)$("loai").value=d.loai;
  if(d.so)$("so").value=d.so;
  if(d.ngay)$("ngay").value=d.ngay;
  if(d.form)setForm(d.form);
  if(d.trichyeu)$("trichyeu").value=d.trichyeu;}

/* ---- Bản chính / Photo (toggle) ---- */
var formVal="";
function setForm(v){formVal=v;var b=document.querySelectorAll("#seg button");
  for(var i=0;i<b.length;i++){b[i].classList.toggle("on",b[i].getAttribute("data-v")===v);}}
(function(){var b=document.querySelectorAll("#seg button");
  for(var i=0;i<b.length;i++){(function(btn){btn.onclick=function(){
    var v=btn.getAttribute("data-v");setForm(formVal===v?"":v);};})(b[i]);}})();

/* ---- Danh mục ---- */
function esc(s){var d=document.createElement("div");d.textContent=(s==null?"":s);return d.innerHTML;}
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1700);}
function formTag(f){
  if(f==="Bản chính")return '<span class="tag g">Bản chính</span>';
  if(f==="Photo")return '<span class="tag o">Photo</span>';
  return "";}
function render(){
  var rows=load();$("count").textContent=rows.length+" VB";
  var box=$("list");
  if(!rows.length){box.innerHTML='<div class="empty">Chưa có văn bản nào.<br>Bấm micro để bắt đầu.</div>';return;}
  var html="";
  for(var i=rows.length-1;i>=0;i--){var r=rows[i];
    html+='<div class="item"><div class="t"><span><b>'+(esc(r[1])||"(chưa rõ loại)")+' '+esc(r[2])+'</b>'+formTag(r[4])+'</span><span class="n">#'+esc(r[0])+'</span></div>'+
      '<div class="m">Ngày: '+(esc(r[3])||"—")+' · '+esc(r[6])+'</div>'+
      (r[5]?'<div class="y">'+esc(r[5])+'</div>':'')+'</div>';}
  box.innerHTML=html;
}
function clearFields(){["loai","so","ngay","trichyeu"].forEach(function(i){$(i).value="";});
  setForm("");$("heard").style.display="none";$("heard").textContent="";}

$("save").onclick=function(){
  var loai=$("loai").value.trim(),so=$("so").value.trim(),ngay=$("ngay").value.trim();
  if(!loai&&!so&&!ngay){toast("Chưa có dữ liệu để lưu");return;}
  var rows=load(),stt=rows.length+1;
  var now=new Date().toLocaleString("vi-VN",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
  rows.push([stt,loai,so,ngay,formVal,$("trichyeu").value.trim(),now]);
  store(rows);render();clearFields();toast("Đã lưu STT "+stt);
};
$("clear").onclick=clearFields;
$("undo").onclick=function(){var rows=load();if(!rows.length){toast("Danh mục trống");return;}
  if(!confirm("Xóa dòng cuối cùng?"))return;rows.pop();for(var i=0;i<rows.length;i++)rows[i][0]=i+1;store(rows);render();toast("Đã xóa dòng cuối");};
$("wipe").onclick=function(){if(!load().length){toast("Danh mục trống");return;}
  if(!confirm("Xóa TOÀN BỘ danh mục? Không khôi phục được."))return;store([]);render();toast("Đã xóa hết");};

function csvField(s){s=String(s==null?"":s);return '"'+s.replace(/"/g,'""')+'"';}
$("export").onclick=function(){
  var rows=load();if(!rows.length){toast("Chưa có dữ liệu");return;}
  var lines=[COLS.map(csvField).join(",")];
  for(var i=0;i<rows.length;i++)lines.push(rows[i].map(csvField).join(","));
  var blob=new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/csv;charset=utf-8"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="danh_muc_van_ban.csv";
  document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},500);
  toast("Đã tạo file CSV");
};

/* ---- Chụp ảnh văn bản + OCR ---- */
function ocrSetStatus(m){var e=$("ocrs");e.textContent=m||"";e.style.display=m?"block":"none";}
function ocrVN(s){var map={"loading tesseract core":"Đang tải lõi OCR…","initializing tesseract":"Đang khởi tạo…","initialized tesseract":"Đã khởi tạo","loading language traineddata":"Đang tải dữ liệu tiếng Việt (vài MB)…","loaded language traineddata":"Đã tải dữ liệu tiếng Việt","initializing api":"Đang chuẩn bị…","initialized api":"Sẵn sàng","recognizing text":"Đang nhận dạng chữ…"};return map[s]||s;}
function loadDownscaled(file,maxDim){return new Promise(function(res,rej){var img=new Image();img.onload=function(){var w=img.naturalWidth||img.width,h=img.naturalHeight||img.height,sc=Math.min(1,maxDim/Math.max(w,h)),cw=Math.max(1,Math.round(w*sc)),ch=Math.max(1,Math.round(h*sc)),c=document.createElement("canvas");c.width=cw;c.height=ch;c.getContext("2d").drawImage(img,0,0,cw,ch);try{res(c.toDataURL("image/jpeg",0.92));}catch(e){rej(e);}};img.onerror=function(){rej(new Error("Không đọc được ảnh"));};var fr=new FileReader();fr.onload=function(){img.src=fr.result;};fr.onerror=rej;fr.readAsDataURL(file);});}
var docImg="",ocrWorker=null;
$("docFile").onchange=function(e){var f=e.target.files[0];if(!f)return;
  loadDownscaled(f,2000).then(function(u){docImg=u;$("cprev").innerHTML='<img src="'+u+'">';ocrSetStatus("");runDocOCR();})
    .catch(function(err){toast("Lỗi ảnh: "+err.message);});};
function runDocOCR(){
  if(!docImg)return;
  if(typeof Tesseract==="undefined"||!Tesseract.createWorker){ocrSetStatus("Không tải được thư viện OCR — mạng có thể chặn cdn.jsdelivr.net. Kiểm tra Internet rồi tải lại trang.");return;}
  $("ocrp").style.display="block";$("ocrpct").textContent="0%";$("ocrbar").style.width="0%";
  ocrSetStatus("Đang chuẩn bị công cụ OCR (lần đầu tải vài MB)…");
  function work(){ocrSetStatus("Đang nhận dạng chữ…");
    return ocrWorker.recognize(docImg).then(function(r){
      var txt=(r&&r.data&&r.data.text)||"";
      if(txt.trim()){fillFromDoc(parseDocument(txt));ocrSetStatus("Đã nhận dạng — đã điền loại/số/ngày, soát lại rồi bấm Lưu.");}
      else ocrSetStatus("Không đọc được chữ. Chụp rõ phần đầu văn bản (tên loại, số, ngày), đủ sáng, chụp thẳng.");
    });
  }
  var start;
  if(ocrWorker){start=work();}
  else{start=Tesseract.createWorker("vie",1,{
      workerPath:"https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/worker.min.js",
      corePath:"https://cdn.jsdelivr.net/npm/tesseract.js-core@5",
      langPath:"https://tessdata.projectnaptha.com/4.0.0",
      logger:function(m){if(m.status){var p=(typeof m.progress==="number")?" "+Math.round(m.progress*100)+"%":"";ocrSetStatus(ocrVN(m.status)+p);}
        if(m.status==="recognizing text"&&typeof m.progress==="number"){var q=Math.round(m.progress*100);$("ocrpct").textContent=q+"%";$("ocrbar").style.width=q+"%";}}
    }).then(function(w){ocrWorker=w;return work();});}
  start.catch(function(err){ocrSetStatus("Lỗi OCR: "+((err&&err.message)||err)+".");})
       .then(function(){$("ocrp").style.display="none";});
}

/* ---- Giọng nói ---- */
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
var rec=null,recording=false,finalText="";
function startUI(){recording=true;$("mic").classList.add("rec");$("mic").textContent="■";$("hint").textContent="Đang nghe… bấm để dừng";}
function stopUI(){recording=false;$("mic").classList.remove("rec");$("mic").textContent="🎤";
  $("hint").innerHTML='Bấm micro rồi đọc, ví dụ:<br><b>“Công văn số 1234 ngày 15 tháng 3 năm 2026, bản chính”</b><br>Nói thêm “bản chính” hoặc “photo” để đánh dấu.';}
if(!SR){
  $("warn").style.display="block";
  $("warn").textContent="Trình duyệt này không hỗ trợ nhận dạng giọng nói. Trên điện thoại nên dùng Chrome (Android). Bạn vẫn có thể gõ tay.";
}else{
  rec=new SR();rec.lang="vi-VN";rec.interimResults=true;rec.continuous=false;rec.maxAlternatives=1;
  rec.onresult=function(e){var interim="";finalText="";
    for(var i=0;i<e.results.length;i++){var t=e.results[i][0].transcript;
      if(e.results[i].isFinal)finalText+=t;else interim+=t;}
    var h=$("heard");h.style.display="block";h.innerHTML="<b>Nghe được:</b> "+esc(finalText+interim);};
  rec.onerror=function(ev){stopUI();
    if(ev.error==="not-allowed"||ev.error==="service-not-allowed")toast("Cần cho phép quyền micro");
    else if(ev.error==="network")toast("Lỗi mạng: cần kết nối Internet");
    else if(ev.error==="no-speech")toast("Không nghe thấy giọng nói");
    else toast("Lỗi: "+ev.error);};
  rec.onend=function(){stopUI();
    if(finalText.trim()){fillFromDoc(parseDocument(finalText.trim()));
      toast("Đã tách dữ liệu — kiểm tra rồi bấm Lưu");}};
  $("mic").onclick=function(){if(recording){rec.stop();}else{finalText="";
    var h=$("heard");h.style.display="block";h.textContent="Đang nghe…";
    try{rec.start();startUI();}catch(e){}}};
}
render();
</script>
